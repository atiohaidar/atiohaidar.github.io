<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tio Haidar Hanif - 3D Interactive Resume</title>
    <meta name="description" content="Resume interaktif 3D Tio Haidar Hanif - Software Engineering Graduate">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Three.js Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader">
            <div class="loader-cube"></div>
            <div class="loader-progress">
                <div class="progress-bar"></div>
            </div>
            <p class="loader-text">Preparing 3D Environment...</p>
            <p class="loader-tip">💡 Tip: Scroll to navigate through the journey</p>
        </div>
    </div>

    <!-- Scroll Container (creates scrollable height) -->
    <div id="scroll-container">
        <section class="scroll-section" data-section="intro"></section>
        <section class="scroll-section" data-section="about"></section>
        <section class="scroll-section" data-section="education"></section>
        <section class="scroll-section" data-section="experience"></section>
        <section class="scroll-section" data-section="skills"></section>
        <section class="scroll-section" data-section="contact"></section>
    </div>

    <!-- Three.js Canvas Container (fixed) -->
    <div id="canvas-container"></div>

    <!-- Scroll Progress Indicator -->
    <div id="scroll-progress">
        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>
        <div class="progress-dots">
            <button class="dot active" data-section="intro" title="Intro"></button>
            <button class="dot" data-section="about" title="About"></button>
            <button class="dot" data-section="education" title="Education"></button>
            <button class="dot" data-section="experience" title="Experience"></button>
            <button class="dot" data-section="skills" title="Skills"></button>
            <button class="dot" data-section="contact" title="Contact"></button>
        </div>
    </div>

    <!-- Section Label (floating) -->
    <div id="section-label">
        <span class="label-icon">👋</span>
        <span class="label-text">Welcome</span>
    </div>

    <!-- Scroll Hint -->
    <div id="scroll-hint">
        <div class="scroll-mouse">
            <div class="scroll-wheel"></div>
        </div>
        <span>Scroll to explore</span>
    </div>

    <!-- Detail Panel -->
    <div id="detail-panel" class="hidden">
        <button id="close-panel" aria-label="Close panel">&times;</button>
        <div id="panel-content"></div>
    </div>

    <!-- Footer -->
    <footer id="footer-overlay">
        <p>Built with Three.js • <a href="https://github.com/atiohaidar" target="_blank" rel="noopener">GitHub</a></p>
    </footer>

    <!-- Main Script -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
